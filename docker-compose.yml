services:
  postgres:
    image: postgres:16-alpine
    container_name: indian-biased-db
    environment:
      POSTGRES_USER: indian_biased
      POSTGRES_PASSWORD: indian_biased_password
      POSTGRES_DB: indian_biased
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indian_biased -d indian_biased"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indian-biased-backend
    environment:
      DATABASE_URL: postgres://indian_biased:indian_biased_password@postgres:5432/indian_biased?sslmode=disable
      PORT: 8080
      GIN_MODE: debug
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 24h
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/auth/google/callback
      FRONTEND_URL: http://localhost:3000
      MIGRATIONS_PATH: /app/migrations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: indian-biased-frontend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "3000:5173"
    depends_on:
      - backend
    restart: on-failure

volumes:
  postgres_data:
